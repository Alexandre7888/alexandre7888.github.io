    <!-- ==================== FIREBASE CONFIG ==================== -->
    <script type="text/babel">
        const firebaseConfig = {
            databaseURL: "https://html-785e3-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        window.firebaseDB = firebase.database();
    </script>

    <!-- ==================== ONESIGNAL PADRÃO ==================== -->
    <script>
        // Variável global do usuário
        let currentUserId = null;
        
        // Função para salvar Subscription ID no Firebase
        async function salvarSubscriptionId(subscriptionId) {
            if (!currentUserId || !subscriptionId) {
                console.log('❌ userId ou subscriptionId vazio');
                return false;
            }
            
            try {
                await window.firebaseDB.ref(`users/${currentUserId}/onesignal`).set({
                    subscriptionId: subscriptionId,
                    updatedAt: Date.now(),
                    status: 'subscribed'
                });
                console.log('✅ Subscription ID salvo no Firebase:', subscriptionId);
                return true;
            } catch (error) {
                console.error('❌ Erro ao salvar:', error);
                return false;
            }
        }
        
        // Função para remover ID do Firebase
        async function removerSubscriptionId() {
            if (!currentUserId) return false;
            try {
                await window.firebaseDB.ref(`users/${currentUserId}/onesignal`).remove();
                console.log('🗑️ Subscription ID removido do Firebase');
                return true;
            } catch (error) {
                console.error('❌ Erro ao remover:', error);
                return false;
            }
        }
        
        // Função para iniciar OneSignal
        function iniciarOneSignal(userId) {
            currentUserId = userId;
            console.log('🚀 Iniciando OneSignal para usuário:', userId);
            
            window.OneSignal = window.OneSignal || [];
            
            OneSignal.push(function() {
                OneSignal.init({
                    appId: "9d6e714d-c316-428d-80fa-ba51aaec2a18",
                    notifyButton: {
                        enable: true,  // 🔥 ATIVA O BOTÃO PADRÃO DO ONESIGNAL 🔥
                        position: 'bottom-right',  // Posição do botão
                        theme: 'default',
                        size: 'medium',
                        offset: {
                            bottom: '20px',
                            right: '20px'
                        }
                    },
                    allowLocalhostAsSecureOrigin: true,
                });
                
                // Verifica se já está inscrito e salva o ID
                OneSignal.isPushNotificationsEnabled().then(function(isEnabled) {
                    console.log('📢 Status da inscrição:', isEnabled ? 'Inscrito' : 'Não inscrito');
                    
                    if (isEnabled) {
                        OneSignal.getSubscriptionId().then(function(subscriptionId) {
                            if (subscriptionId) {
                                console.log('📱 Subscription ID:', subscriptionId);
                                salvarSubscriptionId(subscriptionId);
                            }
                        });
                    }
                });
                
                // Monitora mudanças na inscrição
                OneSignal.on('subscriptionChange', function(isSubscribed) {
                    console.log('📢 Mudança na inscrição:', isSubscribed ? 'Inscrito' : 'Cancelou');
                    
                    if (isSubscribed && currentUserId) {
                        // Usuário permitiu notificações - pega o ID e salva
                        setTimeout(function() {
                            OneSignal.getSubscriptionId().then(function(subscriptionId) {
                                if (subscriptionId) {
                                    console.log('📱 Novo Subscription ID:', subscriptionId);
                                    salvarSubscriptionId(subscriptionId);
                                }
                            });
                        }, 1000);
                    } else if (!isSubscribed && currentUserId) {
                        // Usuário cancelou - remove do Firebase
                        removerSubscriptionId();
                    }
                });
            });
        }
        
        // Exporta a função globalmente
        window.iniciarOneSignal = iniciarOneSignal;
    </script>
