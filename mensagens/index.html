<body>
    <div id="root"></div>
    
    <button id="btn-notificacoes">
        <i class="fas fa-bell"></i>

    <!-- Firebase Config -->
    <script type="text/babel">
        const firebaseConfig = {
            databaseURL: "https://html-785e3-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        window.firebaseDB = firebase.database();
    </script>

    <!-- OneSignal Manager SIMPLES -->
    <script>
        // Variáveis globais
        let currentUserId = null;
        
        // Função para mostrar toast
        function mostrarToast(mensagem) {
            const toast = document.createElement('div');
            toast.className = 'toast-notify';
            toast.textContent = mensagem;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Função para salvar Subscription ID no Firebase
        async function salvarSubscriptionId(subscriptionId) {
            if (!currentUserId || !subscriptionId) {
                console.log('❌ userId ou subscriptionId vazio');
                return false;
            }
            
            try {
                await window.firebaseDB.ref(`users/${currentUserId}/onesignal`).set({
                    subscriptionId: subscriptionId,
                    updatedAt: Date.now(),
                    status: 'subscribed'
                });
                console.log('✅ ID salvo no Firebase:', subscriptionId);
                mostrarToast('✅ Notificações ativadas!');
                return true;
            } catch (error) {
                console.error('❌ Erro:', error);
                return false;
            }
        }
        
        // Função para remover ID do Firebase
        async function removerSubscriptionId() {
            if (!currentUserId) return false;
            try {
                await window.firebaseDB.ref(`users/${currentUserId}/onesignal`).remove();
                console.log('🗑️ ID removido do Firebase');
                mostrarToast('🔕 Notificações desativadas');
                return true;
            } catch (error) {
                console.error('❌ Erro:', error);
                return false;
            }
        }
        
        // Função para atualizar visibilidade do botão
        function atualizarBotao(inscrito) {
            const btn = document.getElementById('btn-notificacoes');
            if (btn) {
                if (inscrito) {
                    btn.classList.add('hidden');
                } else {
                    btn.classList.remove('hidden');
                }
            }
        }
        
        // Função principal para pedir permissão
        function pedirPermissaoNotificacao() {
            console.log('🔔 Botão clicado! Pedindo permissão...');
            
            OneSignal.push(function() {
                OneSignal.isPushNotificationsEnabled().then(function(isEnabled) {
                    if (isEnabled) {
                        console.log('✅ Já está inscrito');
                        mostrarToast('✅ Você já recebe notificações!');
                        atualizarBotao(true);
                    } else {
                        console.log('📢 Solicitando permissão...');
                        OneSignal.registerForPushNotifications().then(function() {
                            console.log('✅ Permissão concedida!');
                            // Aguarda um pouco e pega o ID
                            setTimeout(function() {
                                OneSignal.getSubscriptionId().then(function(subscriptionId) {
                                    if (subscriptionId) {
                                        console.log('📱 ID:', subscriptionId);
                                        salvarSubscriptionId(subscriptionId);
                                        atualizarBotao(true);
                                    }
                                });
                            }, 2000);
                        }).catch(function(err) {
                            console.log('❌ Usuário negou:', err);
                            mostrarToast('❌ Você precisa permitir as notificações');
                        });
                    }
                });
            });
        }
        
        // Inicializar OneSignal e verificar status
        function iniciarOneSignal(userId) {
            currentUserId = userId;
            
            OneSignal.push(function() {
                OneSignal.init({
                    appId: "9d6e714d-c316-428d-80fa-ba51aaec2a18",
                    notifyButton: { enable: false },
                    allowLocalhostAsSecureOrigin: true,
                });
                
                // Verifica status atual
                setTimeout(function() {
                    OneSignal.isPushNotificationsEnabled().then(function(isEnabled) {
                        console.log('📢 Status:', isEnabled ? 'Inscrito' : 'Não inscrito');
                        atualizarBotao(isEnabled);
                        
                        if (isEnabled) {
                            OneSignal.getSubscriptionId().then(function(subscriptionId) {
                                if (subscriptionId) {
                                    salvarSubscriptionId(subscriptionId);
                                }
                            });
                        }
                    });
                }, 2000);
                
                // Monitora mudanças
                OneSignal.on('subscriptionChange', function(isSubscribed) {
                    console.log('📢 Mudou:', isSubscribed ? 'Inscrito' : 'Cancelou');
                    atualizarBotao(isSubscribed);
                    
                    if (isSubscribed && currentUserId) {
                        setTimeout(function() {
                            OneSignal.getSubscriptionId().then(function(subscriptionId) {
                                if (subscriptionId) salvarSubscriptionId(subscriptionId);
                            });
                        }, 1000);
                    } else if (!isSubscribed && currentUserId) {
                        removerSubscriptionId();
                    }
                });
            });
        }
        
        // EXPOR FUNÇÕES GLOBALMENTE
        window.iniciarOneSignal = iniciarOneSignal;
        window.pedirPermissaoNotificacao = pedirPermissaoNotificacao;
        
        // Configurar botão quando o DOM carregar
        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('btn-notificacoes');
            if (btn) {
                // Remove eventos antigos
                const novoBtn = btn.cloneNode(true);
                btn.parentNode.replaceChild(novoBtn, btn);
                
                novoBtn.onclick = function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    console.log('🔔 Clique detectado!');
                    if (window.pedirPermissaoNotificacao) {
                        window.pedirPermissaoNotificacao();
                    }
                };
            }
        });
    </script>
