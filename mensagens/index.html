<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MensagensHUB</title>
    <meta name="description" content="Aplicativo de mensagens real com CodeHUB">
    <link rel="manifest" href="manifest.json">

    <!-- React Dependencies -->
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-X4VF1LWB0F"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-X4VF1LWB0F');
    </script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
    <!-- Biblioteca para leitura de QR Code com câmera -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
 
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <!-- PeerJS for Real Calls -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <!-- CodeHUB Auth API -->
    <script src="https://code.codehub.ct.ws/API/userKeyAPI.js"></script>

    <style type="text/tailwindcss">
        @layer theme {
        :root {
            --primary-color: #00a884;
            --secondary-color: #f0f2f5;
            --chat-bg: #efeae2;
            --outgoing-msg: #d9fdd3;
            --incoming-msg: #ffffff;
        }
    }

    @layer base {
        body {
            @apply bg-[var(--secondary-color)] text-gray-800 font-sans;
            overscroll-behavior: none;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 3px; }
    }

    @layer utilities {
        .bg-chat-pattern {
            background-color: var(--chat-bg);
            background-image: url("https://www.transparenttextures.com/patterns/subtle-white-feathers.png"); 
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        .animate-slide-in-right { animation: slideInRight 0.3s ease-out; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
    }
    </style>
    <meta name="twitter:title" content="MensagensHUB">
    <meta name="twitter:description" content="Aplicativo de mensagens real com CodeHUB e Firebase">
</head>

<body>
    <div id="root"></div>

    <!-- ==================== UTILS ==================== -->
    <script type="text/babel" src="utils/firebaseConfig.js"></script>
    <script type="text/babel" src="utils/notifications.js"></script>
    <script type="text/babel" src="utils/chatApi.js"></script>
    <script type="text/babel" src="utils/helpers.js"></script>
    <script type="text/babel" src="utils/scriptEngine.js"></script>

    <!-- ==================== COMPONENTES BASE ==================== -->
    <!-- Primeiro o registrador de componentes -->
    <script type="text/babel" src="components/ComponentRegistry.js"></script>
    
    <!-- Depois todos os componentes (ordem não importa, só precisam vir depois do registry) -->
    <script type="text/babel" src="components/StatusIndicator.js"></script>
    <script type="text/babel" src="components/StatusBadge.js"></script>
    <script type="text/babel" src="components/UserAvatar.js"></script>
    <script type="text/babel" src="components/ContactItem.js"></script>
    <script type="text/babel" src="components/MessageInput.js"></script>
    <script type="text/babel" src="components/Toast.js"></script>
    <script type="text/babel" src="components/Modal.js"></script>
    <script type="text/babel" src="components/LoadingSpinner.js"></script>
    <script type="text/babel" src="components/ContextMenu.js"></script>
    <script type="text/babel" src="components/ComponentLoader.js"></script>
    <script type="text/babel" src="components/ContactStatusBadge.js"></script>

    <!-- ==================== COMPONENTES ESPECÍFICOS DO SISTEMA ==================== -->
    <script type="text/babel" src="components/AudioRecorder.js"></script>
    <script type="text/babel" src="components/Settings.js"></script>
    <script type="text/babel" src="components/RuleEditor.js"></script>
    <script type="text/babel" src="components/GroupInfo.js"></script>
    <script type="text/babel" src="components/SystemStatus.js"></script>
    <script type="text/babel" src="components/JoinRequestModal.js"></script>
    <script type="text/babel" src="components/Login.js"></script>
    <script type="text/babel" src="components/CallManager.js"></script> 
    <script type="text/babel" src="components/QRCodeConnection.js"></script>

    <!-- ==================== PRINCIPAL ==================== -->
    <script type="text/babel" src="components/ChatInterface.js"></script>
    <script type="text/babel" src="app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(registration => {
                    console.log('SW registrado com sucesso:', registration.scope);
                })
                .catch(err => {
                    console.log('Falha ao registrar SW:', err);
                });
            });
        }
    </script>
</body>

</html>
