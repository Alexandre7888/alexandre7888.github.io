    <!-- ==================== FIREBASE CONFIG ==================== -->
    <script type="text/babel">
        const firebaseConfig = {
            databaseURL: "https://html-785e3-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        window.firebaseDB = firebase.database();
    </script>

    <!-- ==================== ONESIGNAL MANAGER ==================== -->
    <script type="text/babel">
        window.OneSignalManager = {
            currentUserId: null,
            currentSubscriptionId: null,
            
            async init(userId) {
                this.currentUserId = userId;
                
                return new Promise((resolve) => {
                    OneSignal.push(async () => {
                        OneSignal.init({
                            appId: "9d6e714d-c316-428d-80fa-ba51aaec2a18",
                            notifyButton: { enable: false },
                            allowLocalhostAsSecureOrigin: true,
                            autoRegister: true  // 🔥 AUTO REGISTER - pergunta automaticamente
                        });
                        
                        // Verifica se já está inscrito
                        const isEnabled = await OneSignal.isPushNotificationsEnabled();
                        console.log('📢 Status da inscrição:', isEnabled ? 'Inscrito' : 'Não inscrito');
                        
                        if (isEnabled) {
                            await this.getAndSaveSubscriptionId();
                        }
                        
                        // Monitora mudanças na inscrição
                        OneSignal.on('subscriptionChange', async (isSubscribed) => {
                            console.log('📢 Mudança:', isSubscribed ? 'Usuário PERMITIU' : 'Usuário CANCELOU');
                            
                            if (isSubscribed && this.currentUserId) {
                                // Usuário permitiu - salva o ID
                                await this.getAndSaveSubscriptionId();
                            } else if (!isSubscribed && this.currentUserId) {
                                // Usuário cancelou - remove do Firebase
                                await this.removeSubscriptionId();
                            }
                        });
                        
                        resolve(true);
                    });
                });
            },
            
            async getAndSaveSubscriptionId() {
                return new Promise((resolve) => {
                    OneSignal.push(async () => {
                        const subscriptionId = await OneSignal.getSubscriptionId();
                        
                        if (subscriptionId && this.currentUserId) {
                            this.currentSubscriptionId = subscriptionId;
                            console.log('📱 Subscription ID capturado:', subscriptionId);
                            
                            try {
                                await window.firebaseDB.ref(`users/${this.currentUserId}/onesignal`).set({
                                    subscriptionId: subscriptionId,
                                    updatedAt: Date.now(),
                                    status: 'subscribed'
                                });
                                console.log('✅ Subscription ID salvo no Firebase com sucesso!');
                            } catch (error) {
                                console.error('❌ Erro ao salvar no Firebase:', error);
                            }
                        } else {
                            console.log('⚠️ Nenhum subscription ID encontrado');
                        }
                        resolve(subscriptionId);
                    });
                });
            },
            
            async removeSubscriptionId() {
                if (this.currentUserId) {
                    try {
                        await window.firebaseDB.ref(`users/${this.currentUserId}/onesignal`).remove();
                        console.log('🗑️ Subscription ID removido do Firebase');
                    } catch (error) {
                        console.error('❌ Erro ao remover:', error);
                    }
                }
            }
        };
    </script>
