  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.25s ease, border-color 0.2s ease, color 0.2s ease;
    }

    /* ----- TEMAS (DARK / LIGHT) com variáveis CSS ----- */
    :root {
      --bg-gradient-start: #0b1120;
      --bg-gradient-end: #03060c;
      --card-bg: rgba(10, 15, 26, 0.75);
      --canvas-bg: #11161f;
      --canvas-border-dark: #2a3a4a;
      --canvas-inner: #0a0f14;
      --text-primary: #e2e9f0;
      --text-secondary: #a0b3c9;
      --accent-gold: #e6b422;
      --accent-glow: #ffaa44;
      --discord-bg: #5865F2;
      --discord-hover: #4752c4;
      --white-area-bg: #f5f7fc;
      --white-area-text: #1e293b;
      --toggle-bg: #1e2a3a;
      --toggle-border: #3e5a77;
      --shadow-color: rgba(0,0,0,0.5);
    }

    body.light {
      --bg-gradient-start: #e2e8f0;
      --bg-gradient-end: #cbd5e1;
      --card-bg: rgba(240, 246, 255, 0.85);
      --canvas-bg: #f0f4fa;
      --canvas-border-dark: #9aaebf;
      --canvas-inner: #dce5ef;
      --text-primary: #0f172a;
      --text-secondary: #2c3e4e;
      --accent-gold: #b45309;
      --accent-glow: #e67e22;
      --discord-bg: #4c5bd6;
      --discord-hover: #3b48b5;
      --white-area-bg: #ffffff;
      --white-area-text: #0f172a;
      --toggle-bg: #dce5f0;
      --toggle-border: #8ba0bc;
      --shadow-color: rgba(0,0,0,0.1);
    }

    body {
      background: radial-gradient(circle at 30% 20%, var(--bg-gradient-start), var(--bg-gradient-end));
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Layout principal */
    .main-layout {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 24px 24px 24px;
    }

    /* top bar para dar espaçamento (os elementos fixos já estão posicionados, mas garantimos que conteúdo não fique atrás) */
    .content-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      margin-top: 20px;
      margin-bottom: 30px;
    }

    /* Relógio pequeno no CANTO DIREITO (fixed) */
    .mini-clock-corner {
      position: fixed;
      top: 18px;
      right: 20px;
      z-index: 1100;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      border-radius: 60px;
      padding: 6px;
      box-shadow: 0 6px 16px var(--shadow-color);
      border: 1px solid var(--canvas-border-dark);
      cursor: pointer;
      transition: all 0.2s;
    }
    .mini-clock-corner:hover {
      transform: scale(1.02);
      filter: brightness(1.02);
    }
    canvas.mini-canvas {
      display: block;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: var(--canvas-bg);
    }

    /* Botão Discord (canto esquerdo superior) */
    .discord-fixed {
      position: fixed;
      top: 18px;
      left: 20px;
      z-index: 1100;
      background: var(--discord-bg);
      backdrop-filter: blur(4px);
      border-radius: 48px;
      padding: 6px 16px 6px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(255,255,240,0.3);
      box-shadow: 0 6px 14px var(--shadow-color);
      cursor: pointer;
      transition: 0.2s;
      text-decoration: none;
      font-weight: 600;
    }
    .discord-fixed:hover {
      background: var(--discord-hover);
      transform: translateY(-2px);
    }
    .discord-icon {
      width: 28px;
      height: 28px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      color: #5865F2;
    }
    .discord-text {
      color: white;
      font-size: 0.9rem;
      letter-spacing: 0.3px;
    }

    /* Painel de configurações de tema (no canto inferior direito ou área elegante) */
    .theme-panel {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1050;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: 48px;
      padding: 6px 12px;
      display: flex;
      gap: 8px;
      border: 1px solid var(--canvas-border-dark);
      box-shadow: 0 8px 20px var(--shadow-color);
    }
    .theme-btn {
      background: var(--toggle-bg);
      border: none;
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      font-family: inherit;
      backdrop-filter: blur(4px);
      border: 1px solid var(--toggle-border);
    }
    .theme-btn.active {
      background: var(--accent-gold);
      color: #0a0f14;
      box-shadow: 0 0 8px rgba(230, 180, 34, 0.4);
      border-color: var(--accent-glow);
    }
    .theme-btn:hover:not(.active) {
      background: var(--canvas-border-dark);
      transform: translateY(-1px);
    }

    /* Área branca (conteúdo provisório) */
    .white-area {
      width: 100%;
      max-width: 780px;
      margin: 20px auto 30px auto;
      background: var(--white-area-bg);
      border-radius: 32px;
      padding: 28px 24px;
      box-shadow: 0 20px 35px -10px var(--shadow-color);
      border: 1px solid rgba(255,255,245,0.2);
      transition: all 0.2s;
      text-align: center;
    }
    .white-area h3 {
      color: var(--white-area-text);
      font-weight: 600;

      margin-bottom: 12px;
    }
    .white-area p {
      color: var(--white-area-text);

    .white-placeholder {
      background: rgba(0,0,0,0.03);
      border-radius: 24px;

      margin-top: 16px;
      font-style: italic;

    /* mensagem antiga agora adaptada */
    .mensagem-mini {
      text-align: center;

      font-size: 0.85rem;
      background: var(--card-bg);

      border: 1px solid var(--canvas-border-dark);
      display: inline-block;
      margin-top: 8px;
    }
    .mensagem-mini span {
      color: var(--accent-glow);
    }

    @media (max-width: 550px) {
      .discord-text { display: none; }
      .discord-fixed { padding: 8px 12px; }
      .theme-btn span:first-child { display: none; }
      .theme-btn { padding: 6px 12px; font-size: 0.75rem; }
      .mini-canvas { width: 55px !important; height: 55px !important; }
    }

  <!-- Painel de temas (Dark / Light / Sistema) -->

  <script>
    // ---- CONFIGURAÇÕES DE TEMA (DARK, LIGHT, SISTEMA) ----
    const body = document.body;
    const darkBtn = document.getElementById('themeDark');
    const lightBtn = document.getElementById('themeLight');
    const systemBtn = document.getElementById('themeSystem');

    function setTheme(theme) {
      if (theme === 'dark') {
        body.classList.add('dark');
        body.classList.remove('light');
        localStorage.setItem('codehub-theme', 'dark');
        updateActiveButton('dark');
      } else if (theme === 'light') {
        body.classList.add('light');
        body.classList.remove('dark');
        localStorage.setItem('codehub-theme', 'light');
        updateActiveButton('light');
      } else if (theme === 'system') {
        localStorage.setItem('codehub-theme', 'system');
        applySystemTheme();
        updateActiveButton('system');
      }
    }

    function applySystemTheme() {
      const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (isDark) {
        body.classList.add('dark');
        body.classList.remove('light');
      } else {
        body.classList.add('light');
        body.classList.remove('dark');
      }
    }

    function updateActiveButton(active) {
      [darkBtn, lightBtn, systemBtn].forEach(btn => btn.classList.remove('active'));
      if (active === 'dark') darkBtn.classList.add('active');
      if (active === 'light') lightBtn.classList.add('active');
      if (active === 'system') systemBtn.classList.add('active');
    }

    // Carregar tema salvo
    const savedTheme = localStorage.getItem('codehub-theme');
    if (savedTheme === 'dark') setTheme('dark');
    else if (savedTheme === 'light') setTheme('light');
    else if (savedTheme === 'system') setTheme('system');
    else {
      // padrão: dark
      setTheme('dark');
    }

    darkBtn.addEventListener('click', () => setTheme('dark'));
    lightBtn.addEventListener('click', () => setTheme('light'));
    systemBtn.addEventListener('click', () => setTheme('system'));
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (localStorage.getItem('codehub-theme') === 'system') {
        applySystemTheme();
      }
    });

    // ---- RELÓGIO ANALÓGICO (MINI VERSÃO) bem pequeno no canto ----
    const miniCanvas = document.getElementById('miniCanvas');
    let miniCtx = miniCanvas.getContext('2d');
    let miniSize = 200;   // canvas interno, mas via CSS reduzido para 70x70 (alta resolução para nitidez)
    let miniCenter = 100;
    let miniRadius = 88;

    function resizeMiniCanvasInternal() {
      // fixo para evitar perda de qualidade: 200x200 e depois CSS encolhe
      miniCanvas.width = 200;
      miniCanvas.height = 200;
      miniSize = 200;
      miniCenter = 100;
      miniRadius = 88;
    }
    resizeMiniCanvasInternal();

    function drawMiniClock() {
      if (!miniCtx) return;
      const ctxMini = miniCtx;
      const cX = miniCenter, cY = miniCenter, r = miniRadius;
      
      ctxMini.clearRect(0, 0, miniSize, miniSize);
      // fundo do mini relógio (usa cores do tema atual via getComputedStyle)
      const computedStyle = getComputedStyle(body);
      const canvasBg = computedStyle.getPropertyValue('--canvas-bg').trim() || '#11161f';
      ctxMini.fillStyle = canvasBg;
      ctxMini.beginPath();
      ctxMini.arc(cX, cY, r+3, 0, Math.PI*2);
      ctxMini.fill();
      
      // borda externa
      ctxMini.beginPath();
      ctxMini.arc(cX, cY, r+1, 0, Math.PI*2);
      ctxMini.strokeStyle = computedStyle.getPropertyValue('--canvas-border-dark').trim() || '#5a7a9a';
      ctxMini.lineWidth = 1.5;
      ctxMini.stroke();
      
      // traços simplificados (horas principais)
      for (let i = 0; i < 12; i++) {
        let angle = i * Math.PI * 2 / 12 - Math.PI/2;
        let inner = r - 10;
        let outer = r - 2;
        ctxMini.beginPath();
        ctxMini.moveTo(cX + Math.cos(angle)*inner, cY + Math.sin(angle)*inner);
        ctxMini.lineTo(cX + Math.cos(angle)*outer, cY + Math.sin(angle)*outer);
        ctxMini.lineWidth = i % 3 === 0 ? 2.2 : 1.2;
        ctxMini.strokeStyle = i % 3 === 0 ? '#f0c674' : '#8a9bb0';
        ctxMini.stroke();
      }
      
      // ponteiros
      const now = new Date();
      let hours = now.getHours() % 12;
      let minutes = now.getMinutes();
      let seconds = now.getSeconds();
      
      let hourAngle = (hours * 30 + minutes * 0.5) * Math.PI/180 - Math.PI/2;
      let minuteAngle = (minutes * 6 + seconds * 0.1) * Math.PI/180 - Math.PI/2;
      let secondAngle = (seconds * 6) * Math.PI/180 - Math.PI/2;
      
      // ponteiro hora
      ctxMini.beginPath();
      ctxMini.moveTo(cX, cY);
      ctxMini.lineTo(cX + Math.cos(hourAngle) * (r * 0.48), cY + Math.sin(hourAngle) * (r * 0.48));
      ctxMini.lineWidth = 3;
      ctxMini.lineCap = 'round';
      ctxMini.strokeStyle = '#d9e2f0';
      ctxMini.stroke();
      // ponteiro minuto
      ctxMini.beginPath();
      ctxMini.moveTo(cX, cY);
      ctxMini.lineTo(cX + Math.cos(minuteAngle) * (r * 0.68), cY + Math.sin(minuteAngle) * (r * 0.68));
      ctxMini.lineWidth = 2.2;
      ctxMini.strokeStyle = '#bdd4ff';
      ctxMini.stroke();
      // ponteiro segundo
      ctxMini.beginPath();
      ctxMini.moveTo(cX, cY);
      ctxMini.lineTo(cX + Math.cos(secondAngle) * (r * 0.78), cY + Math.sin(secondAngle) * (r * 0.78));
      ctxMini.lineWidth = 1.5;
      ctxMini.strokeStyle = '#ffaa66';
      ctxMini.stroke();
      
      ctxMini.beginPath();
      ctxMini.arc(cX, cY, 4, 0, Math.PI*2);
      ctxMini.fillStyle = '#332211';
      ctxMini.fill();
      ctxMini.beginPath();
      ctxMini.arc(cX, cY, 2, 0, Math.PI*2);
      ctxMini.fillStyle = '#f5c17a';
      ctxMini.fill();
    }
    
    // Atualização do mini relógio a cada segundo
    setInterval(() => {
      drawMiniClock();
    }, 1000);
    drawMiniClock();
    
    // Opcional: se houver necessidade de redesenhar ao mudar tema (cores)
    function refreshAllThemedClocks() {
      drawMiniClock();
    }
    // Monitorar mudanças de tema para redesenhar o mini relógio com novas cores do CSS
    const observer = new MutationObserver(() => {
      drawMiniClock();
    });
    observer.observe(body, { attributes: true, attributeFilter: ['class'] });
    
    // ---- CONFIGURAR LINK DO DISCORD (substitua pelo link da sua comunidade) ----
    const discordLink = document.getElementById('discordLink');
    // LINK OFICIAL (coloque o link real do seu servidor, exemplo placeholder)
    // Caso queira redirecionar para comunidade real, edite essa URL:
    const DISCORD_INVITE_URL = "https://discord.gg/codehub";  // Altere para seu invite real
    discordLink.href = DISCORD_INVITE_URL;
    
    // Adicionar funcionalidade extra: se clicar no mini relógio pode dar zoom ou mostrar algo (opcional)
    const miniWrapper = document.getElementById('miniClockWrapper');
    miniWrapper.addEventListener('click', () => {
      // efeito simpático: não precisa fazer nada, mas apenas um feedback;
      // como solicitado apenas estética, mas não interfere.
      console.log("mini clock tocado");
    });
    
    // Ajuste para garantir que o canvas do mini relógio seja responsivo em tamanho minúsculo
    function adjustMiniCanvasCSS() {
      const wrapper = document.querySelector('.mini-clock-corner');
      if (wrapper) {
        // só reforçar
      }
    }
    window.addEventListener('resize', adjustMiniCanvasCSS);
    adjustMiniCanvasCSS();
    
    // garantir que o fundo da área branca esteja sempre sincronizado com o tema (CSS já faz)
    // pequeno detalhe adicional: texto do relógio grande não existe mais, removemos o canvas grande;
    // Então o design final fica leve apenas com mini relógio + área branca.
    
    // como não há mais o relógio grande, mas mantemos harmonia visual.
    // Adicional: compatibilidade com external scripts existentes (protecao, menu flutuante, assistente IA)
    // todos já incluídos.
    
    // Pequeno toque para se o usuário quiser ver algo, mas tudo nos conformes.
    console.log("CodeHUB - Modo Dark/Light/Sistema ativo, mini relógio + Discord + área branca.");
  </script>
