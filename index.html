  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { getDatabase, ref, push, set, onValue, remove, get, update } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDon4WbCbe4kCkUq-OdLBRhzhMaUObbAfo",
      authDomain: "html-15e80.firebaseapp.com",
      databaseURL: "https://html-15e80-default-rtdb.firebaseio.com",
      projectId: "html-15e80",
      storageBucket: "html-15e80.appspot.com",
      messagingSenderId: "1068148640439",
      appId: "1:1068148640439:web:7cc5bde34f4c5a5ce41b32"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    let userData = null;
    let githubToken = null;
    let githubRepos = [];
    let editingProjectId = null;

    const GOOGLE_SCRIPT = "https://script.google.com/macros/s/AKfycbzsQ6AY3MK1ZjC95O_LgXrGOmE_Z0eSEINhmFYucdaQ-iajC3QEU8vJ6jVS1l-YsrIu/exec";
    const GITHUB_CLIENT_ID = "SEU_CLIENT_ID"; // ⚠️ SUBSTITUA PELO SEU

    // ============ LOADING ============
    const loadingScreen = document.getElementById('loading-screen');
    const appContent = document.getElementById('app-content');
    const imgs = ["foto1.jpg","foto2.jpg","foto3.jpg"].map(f => `https://alexandre7888.github.io/CodeHUB/CodeFOX/${f}`);
    let i = 0;
    setInterval(() => { i = (i+1)%3; document.getElementById('codefox').src = imgs[i]; }, 2000);
    setTimeout(() => { loadingScreen.style.display='none'; appContent.style.display='block'; }, 1500);

    // ============ GITHUB ============
    window.loginWithGitHub = function() {
      const redirect = encodeURIComponent(location.origin + location.pathname);
      location.href = `https://github.com/login/oauth/authorize?client_id=${GITHUB_CLIENT_ID}&redirect_uri=${redirect}&scope=repo,user`;
    };

    function checkGitHubToken() {
      githubToken = localStorage.getItem("github_token");
      const btn = document.getElementById('github-login-btn');
      if (githubToken) {
        btn.textContent = '✅ GitHub Conectado';
        btn.className = 'github-btn connected';
        btn.onclick = () => { if(confirm('Desconectar?')){ localStorage.removeItem('github_token'); githubToken=null; checkGitHubToken(); } };
      } else {
        btn.textContent = '🔗 Conectar GitHub';
        btn.className = 'github-btn';
        btn.onclick = window.loginWithGitHub;
      }
    }

    function jsonp(token, acao, extra={}) {
      return new Promise((resolve, reject) => {
        const cb = '_cb' + Date.now();
        window[cb] = d => { delete window[cb]; d.erro ? reject(new Error(d.erro)) : resolve(d); };
        let url = `${GOOGLE_SCRIPT}?callback=${cb}&token=${token}&acao=${acao}`;
        for (let k in extra) url += `&${k}=${encodeURIComponent(extra[k])}`;
        const s = document.createElement('script'); s.src = url; s.onerror=()=>reject(new Error('Script error')); document.body.appendChild(s);
      });
    }

    window.loadRepos = async function() {
      if (!githubToken) return alert('Conecte o GitHub primeiro!');
      const st = document.getElementById('github-status');
      st.textContent = '⏳ Carregando...'; st.className = 'status-msg info';
      try {
        githubRepos = await jsonp(githubToken, 'listar');
        const sel = document.getElementById('github-repo-select');
        sel.innerHTML = '<option value="">Nenhum</option>';
        githubRepos.forEach(r => { const o = document.createElement('option'); o.value = r.nome; o.textContent = r.nome; sel.appendChild(o); });
        st.textContent = `✅ ${githubRepos.length} repositórios`; st.className = 'status-msg success';
      } catch(e) { st.textContent = '❌ ' + e.message; st.className = 'status-msg error'; }
    };

    async function syncRepoToProject(repoName, projectId) {
      if (!githubToken) return;
      try {
        const user = await jsonp(githubToken, 'user');
        const treeUrl = `https://api.github.com/repos/${user.login}/${repoName}/git/trees/main?recursive=1`;
        const tr = await fetch(treeUrl, { headers: { Authorization: `Bearer ${githubToken}` } });
        const td = await tr.json();
        if (!td.tree) return;
        const files = {};
        for (const item of td.tree) {
          if (item.type === 'blob' && item.path.match(/\.(html|css|js)$/)) {
            const cr = await fetch(item.url, { headers: { Authorization: `Bearer ${githubToken}` } });
            const cd = await cr.json();
            const ext = item.path.split('.').pop();
            const lang = { html:'html', css:'css', js:'javascript' }[ext] || ext;
            files[item.path.replace(/[.\/]/g,'_')] = { name: item.path, content: atob(cd.content||''), language: lang };
          }
        }
        if (Object.keys(files).length) {
          await update(ref(database, `projects/${userData.uid}/${projectId}`), { files, updatedAt: new Date().toISOString() });
        }
      } catch(e) { console.error(e); }
    }

    window.syncProject = async function(projectId, repoName) {
      if (!confirm(`Sincronizar com ${repoName}?`)) return;
      await syncRepoToProject(repoName, projectId);
      alert('✅ Sincronizado!');
    };

    // ============ PROJETOS ============
    function loadProjects(uid) {
      onValue(ref(database, `projects/${uid}`), snap => {
        const container = document.getElementById('projects-container');
        container.innerHTML = '';
        const projects = snap.val() || {};
        if (!Object.keys(projects).length) container.innerHTML = '<p style="text-align:center;color:#999;">Nenhum projeto</p>';
        for (const [pid, p] of Object.entries(projects)) {
          const card = document.createElement('div');
          card.className = 'project-card';
          card.innerHTML = `
            ${p.githubRepo ? `<div class="github-badge">🔗 ${p.githubRepo}</div>` : ''}
            <div class="project-name">📄 ${p.name||''}</div>
            <div class="project-actions">
              <button class="action-btn edit-btn" onclick="location.href='editor.html?projectId=${pid}'">✏️ Abrir</button>
              ${p.githubRepo ? `<button class="action-btn sync-btn" onclick="syncProject('${pid}','${p.githubRepo}')">🔄 Sincronizar</button>` : ''}
              <button class="action-btn" style="background:#6c757d;color:white;" onclick="editProject('${pid}')">⚙️</button>
              <button class="action-btn delete-btn" onclick="deleteProject('${pid}')">🗑️</button>
            </div>`;
          container.appendChild(card);
        }
      });
    }

    window.openNewProjectModal = () => { editingProjectId=null; document.getElementById('modal-title').textContent='✨ Novo Projeto'; document.getElementById('project-name').value=''; document.getElementById('project-modal').style.display='block'; };
    window.closeProjectModal = () => { document.getElementById('project-modal').style.display='none'; };
    window.editProject = async pid => {
      const snap = await get(ref(database, `projects/${userData.uid}/${pid}`));
      const p = snap.val(); editingProjectId=pid;
      document.getElementById('modal-title').textContent='⚙️ Editar';
      document.getElementById('project-name').value=p.name||'';
      document.getElementById('github-repo-select').value=p.githubRepo||'';
      document.getElementById('project-modal').style.display='block';
    };

    document.getElementById('project-form').addEventListener('submit', async e => {
      e.preventDefault();
      const name = document.getElementById('project-name').value.trim();
      if (!name) return;
      const repo = document.getElementById('github-repo-select').value;
      if (editingProjectId) {
        await update(ref(database, `projects/${userData.uid}/${editingProjectId}`), { name, githubRepo: repo||null, updatedAt: new Date().toISOString() });
        if (repo) await syncRepoToProject(repo, editingProjectId);
      } else {
        const ref = push(ref(database, `projects/${userData.uid}`));
        await set(ref, { name, githubRepo: repo||null, owner: userData.displayName, createdAt: new Date().toISOString(), files: { 'index_html': { name:'index.html', content:'<h1>'+name+'</h1>', language:'html' } } });
        if (repo) await syncRepoToProject(repo, ref.key);
      }
      closeProjectModal();
    });

    window.deleteProject = pid => { if(confirm('Excluir?')) remove(ref(database, `projects/${auth.currentUser.uid}/${pid}`)); };
    window.logout = () => signOut(auth).then(()=>location.href='auth.html');

    // ============ AUTH ============
    onAuthStateChanged(auth, async user => {
      if (!user) return location.href='auth.html';
      userData = { uid: user.uid, email: user.email, displayName: user.displayName||user.email.split('@')[0] };
      document.getElementById('username').textContent = '👤 ' + userData.displayName;
      checkGitHubToken();

      // Se voltou do GitHub com code
      const params = new URLSearchParams(location.search);
      const code = params.get('code');
      if (code) {
        history.replaceState({}, '', location.pathname);
        const r = await fetch(`https://code-hub-eta.vercel.app/api/aq?code=${code}`);
        const d = await r.json();
        if (d.token) { localStorage.setItem('github_token', d.token); checkGitHubToken(); }
      }

      loadProjects(user.uid);
    });

    // ============ COOKIES ============
    if (!localStorage.getItem('cookiesAccepted')) document.getElementById('cookie-banner').style.display='flex';
    window.acceptCookies = () => { localStorage.setItem('cookiesAccepted','1'); document.getElementById('cookie-banner').style.display='none'; };
    window.rejectCookies = () => { localStorage.setItem('cookiesAccepted','0'); document.getElementById('cookie-banner').style.display='none'; };
  </script>
</body>
</html>
