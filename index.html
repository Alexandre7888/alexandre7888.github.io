<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeHUB - Relógio Analógico</title>
  <link rel="icon" type="image/png" href="https://alexandre7888.github.io/CodeHUB/InShot_20250807_112151490.jpg">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 20%, #0b1120, #03060c);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    canvas {
      width: min(85vw, 85vh, 450px);
      height: min(85vw, 85vh, 450px);
      background: #11161f;
      border-radius: 50%;
      box-shadow: 0 20px 35px rgba(0,0,0,0.6), inset 0 0 0 2px #2a3a4a, inset 0 0 0 6px #0a0f14;
      transition: all 0.3s;
    }

    .mensagem {
      text-align: center;
      color: #a0b3c9;
      font-size: 1rem;
      background: rgba(10, 15, 26, 0.7);
      backdrop-filter: blur(8px);
      padding: 12px 24px;
      border-radius: 50px;
      border: 1px solid #2a3a4a;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .mensagem span {
      color: #ffaa44;
      font-weight: bold;
    }

    @media (max-width: 500px) {
      .mensagem { font-size: 0.8rem; padding: 8px 16px; }
    }
  </style>
</head>
<body>
<div class="container">
  <canvas id="clockCanvas" width="500" height="500"></canvas>
  <div class="mensagem">
    ⏰ Nós desistimos de fazer o editor por enquanto... <span>um dia a gente pode tentar voltar</span> ✨
  </div>
</div>

<script>
  const canvas = document.getElementById('clockCanvas');
  const ctx = canvas.getContext('2d');
  let size = 500;
  let center = 250;
  let radius = 230;

  function resizeCanvas() {
    const maxSize = Math.min(window.innerWidth * 0.85, window.innerHeight * 0.85, 450);
    canvas.style.width = `${maxSize}px`;
    canvas.style.height = `${maxSize}px`;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function drawClock() {
    size = canvas.width;
    center = size / 2;
    radius = size * 0.44;

    ctx.clearRect(0, 0, size, size);

    // fundo gradiente radial (bússola)
    const grad = ctx.createRadialGradient(center - 8, center - 8, 5, center, center, radius + 10);
    grad.addColorStop(0, '#1a2533');
    grad.addColorStop(1, '#0c111c');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(center, center, radius + 5, 0, Math.PI * 2);
    ctx.fill();

    // anel externo
    ctx.beginPath();
    ctx.arc(center, center, radius + 2, 0, Math.PI * 2);
    ctx.strokeStyle = '#7f8c8d';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // marcações estilo bússola + raios
    for (let i = 0; i < 60; i++) {
      let angle = i * Math.PI * 2 / 60 - Math.PI / 2;
      let inner = (i % 5 === 0) ? radius - 18 : radius - 8;
      let outer = radius - 3;

      if (i % 15 === 0) {  // 12, 3, 6, 9 (cardeais com ponta diamante)
        ctx.beginPath();
        ctx.moveTo(center + Math.cos(angle) * (radius - 25), center + Math.sin(angle) * (radius - 25));
        ctx.lineTo(center + Math.cos(angle) * (radius + 4), center + Math.sin(angle) * (radius + 4));
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#e6b422';
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(center + Math.cos(angle + 0.12) * (radius - 20), center + Math.sin(angle + 0.12) * (radius - 20));
        ctx.lineTo(center + Math.cos(angle) * (radius + 6), center + Math.sin(angle) * (radius + 6));
        ctx.lineTo(center + Math.cos(angle - 0.12) * (radius - 20), center + Math.sin(angle - 0.12) * (radius - 20));
        ctx.fillStyle = '#f0c674';
        ctx.fill();
      }
      else if (i % 5 === 0) {
        ctx.beginPath();
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#bcc9db';
        ctx.moveTo(center + Math.cos(angle) * inner, center + Math.sin(angle) * inner);
        ctx.lineTo(center + Math.cos(angle) * outer, center + Math.sin(angle) * outer);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.lineWidth = 1.2;
        ctx.strokeStyle = '#4a627a';
        ctx.moveTo(center + Math.cos(angle) * (radius - 6), center + Math.sin(angle) * (radius - 6));
        ctx.lineTo(center + Math.cos(angle) * outer, center + Math.sin(angle) * outer);
        ctx.stroke();
      }
    }

    // círculo interno
    ctx.beginPath();
    ctx.arc(center, center, radius - 28, 0, Math.PI * 2);
    ctx.strokeStyle = '#3e5a77';
    ctx.lineWidth = 1.8;
    ctx.stroke();

    // números (12,3,6,9)
    ctx.font = `bold ${Math.floor(size / 18)}px "Segoe UI", system-ui`;
    ctx.fillStyle = '#e2e9f0';
    ctx.shadowBlur = 0;
    ctx.fillText("12", center - 11, center - radius + 22);
    ctx.fillText("6", center - 6, center + radius - 20);
    ctx.fillText("3", center + radius - 28, center + 9);
    ctx.fillText("9", center - radius + 18, center + 9);

    // marcações N S E W (bússola)
    ctx.font = `500 ${Math.floor(size / 22)}px "Segoe UI"`;
    ctx.fillStyle = '#c9b16b';
    ctx.fillText("N", center - 5, center - radius + 10);
    ctx.fillText("S", center - 5, center + radius - 12);
    ctx.fillText("E", center + radius - 20, center + 6);
    ctx.fillText("W", center - radius + 12, center + 6);

    // horas atuais
    let now = new Date();
    let hours = now.getHours() % 12;
    let minutes = now.getMinutes();
    let seconds = now.getSeconds();

    let hourAngle = (hours * 30 + minutes * 0.5) * Math.PI / 180 - Math.PI / 2;
    let minuteAngle = (minutes * 6 + seconds * 0.1) * Math.PI / 180 - Math.PI / 2;
    let secondAngle = (seconds * 6) * Math.PI / 180 - Math.PI / 2;

    // ponteiro horas
    ctx.beginPath();
    ctx.moveTo(center, center);
    ctx.lineTo(center + Math.cos(hourAngle) * (radius * 0.52), center + Math.sin(hourAngle) * (radius * 0.52));
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#d9e2f0';
    ctx.shadowBlur = 4;
    ctx.shadowColor = '#00000040';
    ctx.stroke();

    // ponteiro minutos
    ctx.beginPath();
    ctx.moveTo(center, center);
    ctx.lineTo(center + Math.cos(minuteAngle) * (radius * 0.76), center + Math.sin(minuteAngle) * (radius * 0.76));
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#cbdae9';
    ctx.stroke();

    // ponteiro segundos
    ctx.beginPath();
    ctx.moveTo(center, center);
    ctx.lineTo(center + Math.cos(secondAngle) * (radius * 0.86), center + Math.sin(secondAngle) * (radius * 0.86));
    ctx.lineWidth = 2.2;
    ctx.strokeStyle = '#ff8866';
    ctx.stroke();

    // centro (estilo bússola)
    ctx.beginPath();
    ctx.arc(center, center, 7, 0, Math.PI * 2);
    ctx.fillStyle = '#332211';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(center, center, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = '#f5c17a';
    ctx.fill();

    ctx.shadowBlur = 0;
  }

  setInterval(() => {
    drawClock();
  }, 1000);
  drawClock();
</script>
</body>
</html>
