<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CodeHUB Pro - Editor de Código Avançado</title>
  <link rel="icon" type="image/png" href="https://alexandre7888.github.io/CodeHUB/InShot_20250807_112151490.jpg">
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  
  <!-- Puter.js -->
  <script src="https://js.puter.com/v2/"></script>
  
  <link rel="stylesheet" href="editor.css">
  
  <style>
    :root {
      --zoom-level: 1;
      --bg-primary: #0a0e14;
      --bg-secondary: #111820;
      --bg-tertiary: #182230;
      --bg-elevated: #1e293b;
      --border-color: #1e3040;
      --border-glow: #2a4a6b;
      --text-primary: #e2e8f0;
      --text-secondary: #8899aa;
      --text-muted: #556677;
      --accent-blue: #5b9bd5;
      --accent-cyan: #3dd6c8;
      --accent-green: #4ade80;
      --accent-orange: #f59e0b;
      --accent-red: #ef4444;
      --accent-purple: #a78bfa;
      --accent-pink: #f472b6;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.5);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.6);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    body { 
      height: 100vh; 
      display: flex; 
      flex-direction: column; 
      overflow: hidden;
      zoom: var(--zoom-level);
    }

    /* Loading Screen */
    #loading-screen { 
      position: fixed; 
      top: 0; left: 0; 
      width: 100vw; height: 100vh; 
      background: linear-gradient(180deg, #0a0e14 0%, #111820 50%, #0d1520 100%);
      display: flex; 
      justify-content: center; 
      align-items: center; 
      flex-direction: column; 
      z-index: 99999; 
      transition: opacity 0.6s, visibility 0.6s;
    }

    #loading-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .loader-ring {
      position: relative;
      width: 80px; height: 80px;
    }

    .loader-ring .ring {
      position: absolute;
      width: 100%; height: 100%;
      border-radius: 50%;
      border: 3px solid transparent;
    }

    .loader-ring .ring:nth-child(1) { 
      border-top-color: #3dd6c8; 
      animation: spin 1.2s linear infinite; 
    }

    .loader-ring .ring:nth-child(2) { 
      width: 60px; height: 60px; top: 10px; left: 10px; 
      border-right-color: #a78bfa; 
      animation: spin 1.8s linear infinite reverse; 
    }

    .loader-ring .ring:nth-child(3) { 
      width: 40px; height: 40px; top: 20px; left: 20px; 
      border-bottom-color: #5b9bd5; 
      animation: spin 1.4s linear infinite; 
    }

    @keyframes spin { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(360deg); } 
    }

    #loading-screen h2 { 
      color: #3dd6c8; 
      font-size: 1.2em; 
      font-weight: 600; 
      margin-top: 20px; 
    }

    /* Top Bar */
    #top-bar { 
      display: flex; 
      padding: 8px 14px; 
      background: var(--bg-secondary); 
      align-items: center; 
      border-bottom: 1px solid var(--border-color); 
      flex-wrap: wrap; 
      gap: 6px; 
      z-index: 100; 
      min-height: 44px;
    }

    #project-name { 
      background: var(--bg-primary); 
      color: var(--text-primary); 
      border: 1px solid var(--border-color); 
      border-radius: var(--radius-md); 
      padding: 7px 14px; 
      width: 200px; 
      font-size: 12px;
      font-family: var(--font-sans);
    }

    #project-name:focus { border-color: var(--accent-blue); outline: none; }

    button { 
      background: var(--bg-tertiary); 
      border: 1px solid var(--border-color); 
      color: var(--text-primary); 
      padding: 6px 12px; 
      cursor: pointer; 
      border-radius: var(--radius-md); 
      font-size: 12px; 
      font-weight: 500; 
      transition: all var(--transition-fast); 
      white-space: nowrap;
      display: inline-flex; 
      align-items: center; 
      gap: 5px;
      font-family: var(--font-sans);
    }

    button:hover { 
      background: var(--bg-elevated); 
      border-color: var(--border-glow); 
      transform: translateY(-1px);
    }

    button:active { transform: scale(0.97); }

    #saveFileBtn { 
      background: linear-gradient(135deg, #3dd6c8, #2aa89b); 
      border-color: transparent; 
      color: #000; 
      font-weight: 600; 
      box-shadow: 0 2px 8px rgba(61,214,200,0.3);
    }

    #previewBtn { 
      background: linear-gradient(135deg, #5b9bd5, #4a8bc5); 
      border-color: transparent; 
    }

    #sitePublishBtn { 
      background: linear-gradient(135deg, #4ade80, #3ab868); 
      border-color: transparent; 
      color: #000; 
      font-weight: 600; 
    }

    #siteDeleteBtn { 
      background: linear-gradient(135deg, #ef4444, #d63030); 
      border-color: transparent; 
      display: none; 
    }

    #backToProjects { background: var(--bg-tertiary); }
    #newFileBtn { background: rgba(74,222,128,0.2); border-color: var(--accent-green); }
    #closeFileBtn { background: rgba(239,68,68,0.2); border-color: var(--accent-red); }

    .url-panel-top { 
      display: flex; align-items: center; gap: 5px; 
      background: var(--bg-primary); padding: 4px 8px; 
      border-radius: var(--radius-xl); border: 1px solid var(--border-color);
    }

    .url-panel-top input { 
      background: transparent; border: none; 
      color: var(--accent-cyan); padding: 4px 8px; 
      font-family: var(--font-mono); font-size: 10px; width: 200px;
    }

    .zoom-controls {
      display: flex; align-items: center; gap: 2px; 
      background: var(--bg-primary); padding: 3px 6px; 
      border-radius: var(--radius-xl); border: 1px solid var(--border-color);
    }

    .zoom-controls button { 
      padding: 2px 6px; font-size: 11px; 
      border: none; background: transparent; 
    }

    .zoom-controls span { 
      font-size: 10px; min-width: 36px; text-align: center; 
      color: var(--accent-cyan); font-weight: 700; 
      font-family: var(--font-mono); 
    }

    #user-info { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    #user-name { 
      font-size: 12px; font-weight: 600; color: var(--accent-cyan); 
    }

    .logout-btn { 
      background: linear-gradient(135deg, #ef4444, #c53030); 
      border-color: transparent; 
    }

    #auto-save-status {
      display: flex; align-items: center; gap: 5px; 
      background: var(--bg-primary); padding: 4px 10px; 
      border-radius: var(--radius-xl); border: 1px solid var(--border-color);
      font-size: 10px; color: var(--text-secondary); white-space: nowrap;
    }

    #auto-save-indicator { 
      width: 6px; height: 6px; border-radius: 50%; 
      background: var(--text-muted); display: inline-block; 
    }

    #auto-save-time { 
      font-family: var(--font-mono); color: var(--accent-cyan); 
      font-weight: 600; font-size: 10px; 
    }

    /* Main Container */
    .main-container { display: flex; flex: 1; overflow: hidden; }

    /* Workers Panel */
    #workers-panel {
      width: 250px; background: var(--bg-secondary); 
      border-right: 1px solid var(--border-color);
      display: flex; flex-direction: column; overflow: hidden; 
      min-width: 180px; max-width: 380px; position: relative;
    }

    .workers-resize-handle {
      position: absolute; right: -2px; top: 0; 
      width: 5px; height: 100%; cursor: col-resize; z-index: 100;
    }

    .workers-resize-handle:hover { background: var(--accent-blue); }

    .workers-header {
      padding: 12px 14px; background: var(--bg-tertiary); 
      display: flex; justify-content: space-between; align-items: center; 
      border-bottom: 1px solid var(--border-color);
      font-weight: 700; font-size: 12px; text-transform: uppercase; 
      color: var(--accent-cyan);
    }

    .workers-count {
      font-size: 10px; color: var(--accent-green); 
      background: rgba(74,222,128,0.15); padding: 2px 8px; border-radius: 12px;
    }

    .workers-list { 
      flex: 1; overflow-y: auto; padding: 8px; 
      display: flex; flex-direction: column; gap: 6px; 
    }

    .workers-list::-webkit-scrollbar { width: 4px; }
    .workers-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

    .worker-item {
      background: var(--bg-primary); border: 1px solid var(--border-color);
      border-radius: var(--radius-md); padding: 10px 12px; 
      cursor: pointer; font-size: 11px;
    }

    .worker-item:hover { border-color: var(--accent-blue); }

    .worker-item.active { 
      border-color: var(--accent-cyan); 
      background: rgba(61,214,200,0.08); 
    }

    .worker-item .worker-name { 
      font-weight: 700; color: var(--accent-cyan); font-size: 12px; 
      display: flex; align-items: center; gap: 6px;
    }

    .worker-item .worker-name .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent-green);
    }

    .worker-item .worker-route { 
      color: var(--text-secondary); font-size: 10px; 
      margin-top: 4px; font-family: var(--font-mono); 
    }

    .worker-item .worker-url {
      color: var(--accent-green); font-size: 9px; 
      margin-top: 3px; word-break: break-all;
      font-family: var(--font-mono); opacity: 0.8;
    }

    .worker-actions {
      display: flex; gap: 4px; margin-top: 8px;
    }

    .worker-actions button {
      font-size: 9px; padding: 3px 7px;
    }

    .workers-footer { 
      padding: 10px; border-top: 1px solid var(--border-color); 
      background: var(--bg-tertiary); 
    }

    .workers-footer button { 
      width: 100%; 
      background: linear-gradient(135deg, #4ade80, #3ab868); 
      border-color: transparent; color: #000; 
      font-weight: 600; justify-content: center; 
    }

    /* Editor Container */
    #editor-container { 
      flex: 2; display: flex; flex-direction: column; 
      overflow: hidden; background: var(--bg-primary); 
    }

    #tabs { 
      display: flex; background: var(--bg-secondary); 
      align-items: center; gap: 2px; overflow-x: auto; 
      min-height: 34px; padding: 4px 8px 0;
      border-bottom: 1px solid var(--border-color);
    }

    #tabs::-webkit-scrollbar { height: 2px; }
    #tabs::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

    .tab-btn { 
      background: var(--bg-primary); padding: 7px 30px 7px 14px; 
      position: relative; border-radius: var(--radius-md) var(--radius-md) 0 0; 
      font-size: 11px; font-weight: 500;
      border: 1px solid var(--border-color); border-bottom: none; 
      cursor: pointer; white-space: nowrap;
    }

    .tab-btn:hover { background: var(--bg-tertiary); }

    .tab-btn.active { 
      background: var(--bg-elevated); 
      border-bottom: 2px solid var(--accent-cyan); 
      font-weight: 600; color: var(--accent-cyan); 
    }

    .close-tab-btn { 
      position: absolute; right: 8px; top: 50%; 
      transform: translateY(-50%); background: transparent; 
      border: none; color: var(--text-muted); cursor: pointer; 
      font-size: 12px; width: 18px; height: 18px; 
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
    }

    .close-tab-btn:hover { 
      color: var(--accent-red); 
      background: rgba(239,68,68,0.15); 
    }

    #container { 
      flex: 1; overflow: hidden; position: relative; 
      background: var(--bg-primary); 
    }

    #simple-editor { 
      width: 100%; height: 100%; background: transparent; 
      color: #c9d1d9; font-family: var(--font-mono); 
      font-size: 13px; padding: 16px 20px; 
      border: none; resize: none; outline: none; 
      line-height: 1.8; tab-size: 2;
    }

    /* AI Sidebar */
    #ai-sidebar { 
      width: 400px; background: var(--bg-secondary); 
      border-left: 1px solid var(--border-color); 
      display: flex; flex-direction: column; position: relative; 
      min-width: 260px; max-width: 560px;
    }

    .resize-handle { 
      position: absolute; left: -3px; top: 0; 
      width: 6px; height: 100%; cursor: col-resize; z-index: 100; 
    }

    .resize-handle:hover { background: var(--accent-purple); }

    .sidebar-header { 
      padding: 12px 14px; background: var(--bg-tertiary); 
      display: flex; justify-content: space-between; 
      align-items: center; border-bottom: 1px solid var(--border-color); 
      font-weight: 700; font-size: 13px;
    }

    .ai-status-dot { 
      width: 8px; height: 8px; border-radius: 50%; 
      background: var(--accent-green); display: inline-block; 
      margin-right: 4px; 
    }

    .ai-status-dot.streaming { 
      background: var(--accent-cyan); 
      animation: pulse 0.5s infinite; 
    }

    @keyframes pulse { 
      0%,100% { opacity: 1; } 
      50% { opacity: 0.5; } 
    }

    .chat-messages { 
      flex: 1; overflow-y: auto; padding: 12px; 
      display: flex; flex-direction: column; gap: 8px; 
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

    .message { 
      padding: 10px 14px; border-radius: var(--radius-md); 
      max-width: 92%; word-wrap: break-word; 
      font-size: 12px; line-height: 1.6; 
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(6px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    .message.user { 
      background: linear-gradient(135deg, #3b5998, #4a6fc4); 
      align-self: flex-end; 
    }

    .message.ai { 
      background: var(--bg-tertiary); align-self: flex-start; 
      white-space: pre-wrap; border: 1px solid var(--border-color); 
    }

    .message.system { 
      background: rgba(150,150,170,0.08); align-self: center; 
      font-size: 10px; border-radius: var(--radius-xl); 
      border: 1px solid var(--border-color); color: var(--text-secondary); 
      text-align: center;
    }

    .message.success { 
      background: rgba(74,222,128,0.1); align-self: center; 
      font-size: 10px; border-radius: var(--radius-xl); 
      border: 1px solid rgba(74,222,128,0.3); color: var(--accent-green); 
      text-align: center;
    }

    .message.error { 
      background: rgba(239,68,68,0.1); align-self: center; 
      font-size: 10px; border-radius: var(--radius-xl); 
      border: 1px solid rgba(239,68,68,0.3); color: var(--accent-red); 
      text-align: center;
    }

    .chat-controls { 
      padding: 10px; border-top: 1px solid var(--border-color); 
      background: var(--bg-tertiary); 
    }

    .chat-input-wrapper { display: flex; gap: 6px; }

    .chat-input-wrapper textarea { 
      flex: 1; background: var(--bg-primary); 
      border: 1px solid var(--border-color); 
      color: var(--text-primary); padding: 10px 12px; 
      border-radius: var(--radius-md); resize: none; 
      font-family: var(--font-sans); font-size: 12px; line-height: 1.5;
    }

    .chat-input-wrapper textarea:focus { 
      border-color: var(--accent-purple); outline: none; 
    }

    .chat-input-wrapper button { 
      background: linear-gradient(135deg, #a78bfa, #8b6fe0); 
      border-color: transparent; font-weight: 600; padding: 8px 16px; 
    }

    .quick-actions { 
      display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; 
    }

    .quick-actions button { 
      font-size: 9px; padding: 3px 8px; 
      border-radius: var(--radius-xl); 
    }

    .quick-actions button:hover { 
      border-color: var(--accent-purple); 
      background: rgba(167,139,250,0.1); 
    }

    #stopStreamBtn { 
      background: linear-gradient(135deg, #ef4444, #d63030); 
      border-color: transparent; color: #fff; display: none; 
    }

    /* Notifications */
    .notification { 
      position: fixed; bottom: 20px; right: 20px; 
      padding: 12px 18px; border-radius: var(--radius-md); 
      color: white; z-index: 10000; font-size: 12px; 
      font-weight: 600; box-shadow: var(--shadow-lg);
      animation: slideIn 0.35s ease;
    }

    @keyframes slideIn { 
      from { transform: translateX(120%); opacity: 0; } 
      to { transform: translateX(0); opacity: 1; } 
    }

    .notification.success { background: rgba(35,134,54,0.95); }
    .notification.error { background: rgba(218,54,51,0.95); }
    .notification.info { background: rgba(31,111,235,0.95); }

    /* Modals */
    .modal-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.75); display: none; 
      justify-content: center; align-items: center; z-index: 10001;
    }

    .modal-box { 
      background: var(--bg-elevated); border: 1px solid var(--border-color);
      border-radius: var(--radius-lg); padding: 24px; 
      max-width: 460px; width: 90%; text-align: center; 
      box-shadow: var(--shadow-lg); animation: scaleIn 0.3s ease;
    }

    @keyframes scaleIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal-box h3 { 
      color: var(--text-primary); margin-bottom: 12px; 
      font-size: 16px; font-weight: 700; 
    }

    .modal-box p { 
      color: var(--text-secondary); margin-bottom: 18px; font-size: 13px; 
    }

    .modal-buttons { display: flex; gap: 10px; justify-content: center; }

    .modal-buttons button { 
      padding: 8px 22px; font-size: 13px; 
      font-weight: 600; border-radius: var(--radius-md); 
    }

    #previewModal .modal-box { 
      max-width: 95vw; max-height: 92vh; width: 95vw; height: 92vh; 
      padding: 6px; display: flex; flex-direction: column; text-align: left; 
    }

    #previewIframe { 
      flex: 1; width: 100%; border: none; background: #fff; 
      border-radius: var(--radius-md); 
    }

    .preview-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; background: var(--bg-primary); 
      border-radius: var(--radius-md); margin-bottom: 6px;
    }

    .preview-header span { 
      font-size: 12px; color: var(--accent-cyan); font-weight: 600; 
    }

    /* Responsive */
    @media (max-width: 768px) {
      #workers-panel { display: none; }
      #ai-sidebar { 
        width: 100% !important; min-width: 100% !important; 
        max-width: 100% !important; 
      }
      #top-bar { gap: 4px; padding: 6px 8px; }
      #project-name { width: 120px; }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader-ring">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
    </div>
    <h2>CodeHUB Pro</h2>
  </div>

  <!-- App Content -->
  <div id="app-content" style="display:none;flex:1;flex-direction:column;">
    <!-- Top Bar -->
    <div id="top-bar">
      <button id="backToProjects" onclick="window.location.href='index.html'">🏠</button>
      <input type="text" id="project-name" placeholder="Nome do Projeto">
      <button id="saveFileBtn">💾 Salvar</button>
      <button id="previewBtn">👁️ Preview</button>
      <button id="sitePublishBtn">🚀 Publicar</button>
      <button id="siteDeleteBtn">🗑️ Deletar</button>
      <div id="auto-save-status">
        <span id="auto-save-indicator"></span>
        <span id="auto-save-text">Pronto</span>
        <span id="auto-save-time"></span>
      </div>
      <button onclick="showVersionHistory()" title="Ctrl+H">🕒</button>
      <button id="newFileBtn" onclick="newFile()" title="Ctrl+N">📄</button>
      <button id="closeFileBtn" onclick="closeCurrentFile()" title="Ctrl+W">✕</button>
      <div class="url-panel-top" id="urlPanelTop" style="display:none;">
        <input type="text" id="fileUrlTop" readonly onclick="this.select()">
        <button onclick="window.open(document.getElementById('fileUrlTop').value,'_blank')" style="padding:3px 6px;font-size:10px;">🔗</button>
        <button onclick="copyUrl()" style="padding:3px 6px;font-size:10px;">📋</button>
      </div>
      <div class="zoom-controls">
        <button onclick="changeZoom(-0.1)">➖</button>
        <span id="zoomLevel">100%</span>
        <button onclick="changeZoom(0.1)">➕</button>
        <button onclick="resetZoom()">↺</button>
      </div>
      <div id="user-info">
        <span id="user-name"></span>
        <button class="logout-btn" onclick="logout()">Sair</button>
      </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
      <!-- Workers Panel -->
      <div id="workers-panel">
        <div class="workers-resize-handle" id="workersResizeHandle"></div>
        <div class="workers-header">
          <span>⚡ Workers</span>
          <span class="workers-count" id="workersCount">0</span>
        </div>
        <div class="workers-list" id="workersList">
          <div style="color:var(--text-muted);font-size:11px;text-align:center;padding:30px;">📭 Nenhum worker</div>
        </div>
        <div class="workers-footer">
          <button onclick="createNewWorker()">➕ Novo Worker</button>
        </div>
      </div>

      <!-- Editor -->
      <div id="editor-container">
        <div id="tabs"></div>
        <div id="container">
          <textarea id="simple-editor" placeholder="// Comece a codar aqui..."></textarea>
        </div>
      </div>

      <!-- AI Sidebar -->
      <div id="ai-sidebar">
        <div class="resize-handle" id="resizeHandle"></div>
        <div class="sidebar-header">
          <span>🤖 IA Assistente</span>
          <span style="font-size:10px;display:flex;align-items:center;gap:4px;">
            <span class="ai-status-dot" id="aiStatusDot"></span>
            <span id="aiStatusText">Online</span>
          </span>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div class="message system">✨ IA pronta! Use Ctrl+Enter para enviar mensagem.</div>
        </div>
        <div class="chat-controls">
          <div class="chat-input-wrapper">
            <textarea id="chatInput" placeholder="Descreva o que deseja..." rows="2"></textarea>
            <button onclick="sendToAI()">Enviar</button>
            <button id="stopStreamBtn" onclick="stopStream()">⏹ Parar</button>
          </div>
          <div class="quick-actions">
            <button onclick="quickAI('create_html')">📄 HTML</button>
            <button onclick="quickAI('create_css')">🎨 CSS</button>
            <button onclick="quickAI('create_js')">⚡ JS</button>
            <button onclick="quickAI('create_worker')">🔧 Worker</button>
            <button onclick="quickAI('analyze')">🔍 Analisar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal-box">
      <h3 id="modalTitle">Confirmar</h3>
      <p id="modalMessage"></p>
      <div class="modal-buttons">
        <button onclick="modalConfirm()" style="background:#238636;">✅ Confirmar</button>
        <button onclick="modalCancel()" style="background:#da3633;">❌ Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Preview Modal -->
  <div class="modal-overlay" id="previewModal">
    <div class="modal-box">
      <div class="preview-header">
        <span>👁️ Preview ao Vivo</span>
        <div style="display:flex;gap:6px;">
          <button onclick="refreshPreview()" style="font-size:11px;padding:4px 10px;">🔄</button>
          <button onclick="openPreviewExterno()" style="font-size:11px;padding:4px 10px;">🔗</button>
          <button onclick="closePreviewModal()" style="font-size:11px;padding:4px 10px;background:#da3633;border-color:transparent;">✕</button>
        </div>
      </div>
      <iframe id="previewIframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
    </div>
  </div>

  <!-- New File Modal -->
  <div class="modal-overlay" id="newFileModal">
    <div class="modal-box" style="text-align:left;">
      <h3>📄 Novo Arquivo</h3>
      <div style="display:flex;flex-direction:column;gap:10px;margin:12px 0;">
        <label style="font-size:11px;color:var(--text-secondary);font-weight:600;">Nome:</label>
        <input type="text" id="newFileName" placeholder="ex: style.css" style="background:var(--bg-primary);border:1px solid var(--border-color);color:var(--text-primary);padding:8px 12px;border-radius:var(--radius-md);font-size:12px;">
        <label style="font-size:11px;color:var(--text-secondary);font-weight:600;">Tipo:</label>
        <select id="newFileType" style="background:var(--bg-primary);border:1px solid var(--border-color);color:var(--text-primary);padding:8px 12px;border-radius:var(--radius-md);font-size:12px;">
          <option value="html">HTML</option>
          <option value="css">CSS</option>
          <option value="js">JavaScript</option>
        </select>
      </div>
      <div class="modal-buttons">
        <button onclick="confirmNewFile()" style="background:#238636;">✅ Criar</button>
        <button onclick="closeNewFileModal()" style="background:#da3633;">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- New Worker Modal -->
  <div class="modal-overlay" id="newWorkerModal">
    <div class="modal-box" style="text-align:left;">
      <h3>➕ Novo Worker</h3>
      <div style="display:flex;flex-direction:column;gap:10px;margin:12px 0;">
        <label style="font-size:11px;color:var(--text-secondary);font-weight:600;">Nome:</label>
        <input type="text" id="newWorkerName" placeholder="meu-worker" style="background:var(--bg-primary);border:1px solid var(--border-color);color:var(--text-primary);padding:8px 12px;border-radius:var(--radius-md);font-size:12px;">
        <label style="font-size:11px;color:var(--text-secondary);font-weight:600;">Rota:</label>
        <input type="text" id="newWorkerRoute" placeholder="/api/hello" style="background:var(--bg-primary);border:1px solid var(--border-color);color:var(--text-primary);padding:8px 12px;border-radius:var(--radius-md);font-size:12px;">
      </div>
      <div class="modal-buttons">
        <button onclick="confirmNewWorker()" style="background:#238636;">✅ Criar</button>
        <button onclick="closeNewWorkerModal()" style="background:#da3633;">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Version History Modal -->
  <div class="modal-overlay" id="versionHistoryModal">
    <div class="modal-box" style="max-width:600px;max-height:70vh;overflow-y:auto;text-align:left;">
      <h3>🕒 Histórico de Versões</h3>
      <p style="font-size:11px;color:var(--text-muted);">Arquivo: <span id="versionFileName"></span></p>
      <div id="versionList" style="color:var(--text-secondary);font-size:11px;max-height:45vh;overflow-y:auto;"></div>
      <div class="modal-buttons" style="margin-top:16px;">
        <button onclick="closeVersionHistoryModal()" style="background:#da3633;">Fechar</button>
      </div>
    </div>
  </div>

  <script src="editor.js"></script>
</body>
</html>
